<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Beta AI Chat</title>
    <style>
        :root {
            --bg-color: #121212;
            --chat-bg: #1e1e1e;
            --accent-color: #4da6ff;
            --text-color: #ffffff;
            --input-bg: #2d2d2d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            /* Исправление для мобильных браузеров */
            height: -webkit-fill-available; 
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        html {
            height: -webkit-fill-available;
        }

        /* Название в углу */
        .header {
            padding: 15px 20px;
            background: var(--bg-color);
            z-index: 10;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            color: var(--accent-color);
            letter-spacing: 1px;
        }

        /* Чат */
        .chat-container {
            flex: 1;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            background-color: var(--chat-bg);
            display: flex;
            flex-direction: column;
            position: relative;
            /* Скругление только на больших экранах */
            border-radius: 15px 15px 0 0; 
        }

        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-bottom: 30px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.4;
            word-wrap: break-word;
            font-size: 16px; /* Оптимально для телефона */
        }

        .user-msg {
            background-color: var(--accent-color);
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .ai-msg {
            background-color: #333;
            color: #e0e0e0;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        /* Поле ввода */
        .chat-input-area {
            display: flex;
            padding: 12px 15px;
            background-color: #1a1a1a;
            border-top: 1px solid #333;
            gap: 10px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom)); /* Для iPhone с челкой */
        }

        input[type="text"] {
            flex: 1;
            padding: 14px;
            border: 1px solid #444;
            background-color: var(--input-bg);
            color: #fff;
            border-radius: 25px;
            outline: none;
            font-size: 16px; /* Предотвращает зум на iPhone */
        }

        button {
            width: 50px;
            height: 50px;
            background-color: var(--accent-color);
            color: #fff;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform 0.1s;
        }

        button:active {
            transform: scale(0.9);
        }

        /* Адаптация под десктоп */
        @media (min-width: 768px) {
            .chat-container {
                margin: 20px auto;
                height: 85vh;
                border-radius: 15px;
                border: 1px solid #333;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">Beta AI</div>
    </div>

    <div class="chat-container">
        <div class="chat-messages" id="chat-messages">
            <div class="message ai-msg">Привет! Я готов к работе. О чем пообщаемся?</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Сообщение..." autocomplete="off">
            <button onclick="sendMessage()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>

    <script>
        // ВСТАВЬ СВОЙ КЛЮЧ СЮДА
        const API_KEY = 'AIzaSyAbNi8nRsoRdno0wiYTXaFNxsL6ZL-7oYk'; 

        const chatMessages = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');

        // Обработка нажатия Enter
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        function appendMessage(text, className) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${className}`;
            
            // Обработка простого форматирования (жирный шрифт и ссылки)
            let formattedText = text
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>') // Жирный текст **текст**
                .replace(/\n/g, "<br>");

            msgDiv.innerHTML = formattedText;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTo({ top: chatMessages.scrollHeight, behavior: 'smooth' });
            return msgDiv;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text || !API_KEY || API_KEY === 'AIzaSyAbNi8nRsoRdno0wiYTXaFNxsL6ZL-7oYk') {
                if (API_KEY.includes('ТВОЙ')) alert('Пожалуйста, вставьте API ключ в код!');
                return;
            }

            appendMessage(text, 'user-msg');
            userInput.value = '';
            
            const aiMsgElement = appendMessage('...', 'ai-msg');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }]
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error ? data.error.message : 'Ошибка сервера');
                }

                // Исправлена ошибка: проверяем, есть ли ответ (иногда ИИ блокирует текст)
                if (data.candidates && data.candidates[0].content) {
                    const aiResponseText = data.candidates[0].content.parts[0].text;
                    aiMsgElement.innerHTML = ''; // Очищаем точки
                    
                    // Выводим текст с форматированием
                    let finalHtml = aiResponseText
                        .replace(/</g, "&lt;")
                        .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
                        .replace(/\n/g, "<br>");
                    
                    aiMsgElement.innerHTML = finalHtml;
                } else {
                    aiMsgElement.innerHTML = "<i>ИИ не смог сформировать ответ (возможно, запрос отклонен системой безопасности).</i>";
                }
                
            } catch (error) {
                console.error(error);
                aiMsgElement.innerHTML = `Ошибка: ${error.message}. Попробуйте включить VPN или проверить ключ.`;
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Beta AI</title>
    <style>
        :root { 
            --bg: #131314; --panel: #1e1f20; --text: #e3e3e3; 
            --accent: #8ab4f8; --user-msg: #2b2c2f; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 16px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #333; flex-shrink: 0; }
        .logo-icon { width: 24px; height: 24px; background: linear-gradient(45deg, #4285f4, #9b72cb); border-radius: 6px; }
        header h1 { font-size: 18px; font-weight: 500; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 24px; }
        .bubble { max-width: 85%; line-height: 1.6; font-size: 16px; }
        .user-wrapper { align-self: flex-end; }
        .user-bubble { background: var(--user-msg); padding: 12px 18px; border-radius: 20px 24px 4px 24px; }
        .ai-wrapper { align-self: flex-start; display: flex; gap: 12px; width: 100%; }
        .ai-avatar { width: 32px; height: 32px; background: #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .ai-bubble { flex: 1; padding-top: 4px; }
        .img-preview { max-width: 200px; border-radius: 10px; margin-bottom: 8px; display: block; }
        .input-container { padding: 10px 15px calc(15px + env(safe-area-inset-bottom, 0px)); background: var(--bg); }
        #preview-area { display: none; padding: 10px; background: #1e1f20; border-radius: 15px 15px 0 0; position: relative; }
        #preview-img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 1px solid #444; }
        .remove-img { position: absolute; top: 5px; left: 65px; background: #ff4d4d; border: none; color: white; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; font-size: 12px; }
        .input-bar { background: var(--panel); border-radius: 28px; display: flex; align-items: flex-end; padding: 8px 12px; }
        textarea { flex: 1; background: transparent; border: none; color: white; outline: none; resize: none; font-size: 16px; max-height: 150px; padding: 10px; }
        .btn-icon { width: 40px; height: 40px; border-radius: 50%; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .btn-icon svg { fill: #c4c7c5; width: 24px; height: 24px; }
        #sendBtn.active svg { fill: var(--accent); }
        .loading { display: flex; gap: 5px; padding: 10px 0; }
        .dot { width: 6px; height: 6px; background: #666; border-radius: 50%; animation: pulse 1.5s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        @media (min-width: 768px) { #chat, .input-container, header { max-width: 800px; margin: 0 auto; width: 100%; } }
    </style>
</head>
<body>
    <header>
        <div class="logo-icon"></div>
        <h1>Beta AI 0.1.3</h1>
    </header>
    <div id="chat">
        <div class="ai-wrapper">
            <div class="ai-avatar">✨</div>
            <div class="ai-bubble">Привет, чем я могу помочь?</div>
        </div>
    </div>
    <div class="input-container">
        <div id="preview-area">
            <img id="preview-img" src="">
            <button class="remove-img" onclick="clearImage()">×</button>
        </div>
        <div class="input-bar">
            <label class="btn-icon">
                <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFile(this)">
            </label>
            <textarea id="prompt" rows="1" placeholder="Введите сообщение..."></textarea>
            <button id="sendBtn" class="btn-icon">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>
    <script>
        const API_KEY = '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';
        const MODEL_ID = 'llama-3.2-90b-vision-instant';
        const chat = document.getElementById('chat');
        const prompt = document.getElementById('prompt');
        const btn = document.getElementById('sendBtn');
        let currentBase64 = null;

        function handleFile(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                currentBase64 = e.target.result;
                document.getElementById('preview-img').src = currentBase64;
                document.getElementById('preview-area').style.display = 'block';
                btn.classList.add('active');
            };
            reader.readAsDataURL(file);
        }

        function clearImage() {
            currentBase64 = null;
            document.getElementById('preview-area').style.display = 'none';
            document.getElementById('fileInput').value = '';
            if (!prompt.value.trim()) btn.classList.remove('active');
        }

        prompt.addEventListener('input', () => {
            prompt.style.height = 'auto';
            prompt.style.height = prompt.scrollHeight + 'px';
            btn.classList.toggle('active', prompt.value.trim().length > 0 || currentBase64);
        });

        function addMessage(role, text, img = null) {
            const wrapper = document.createElement('div');
            wrapper.className = role === 'user' ? 'user-wrapper bubble' : 'ai-wrapper bubble';
            let content = text.replace(/</g, "&lt;").replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\n/g, '<br>');
            if (role === 'user') {
                let imgHtml = img ? `<img src="${img}" class="img-preview">` : '';
                wrapper.innerHTML = `<div class="user-bubble">${imgHtml}${content}</div>`;
            } else {
                wrapper.innerHTML = `<div class="ai-avatar">✨</div><div class="ai-bubble">${content}</div>`;
            }
            chat.appendChild(wrapper);
            chat.scrollTop = chat.scrollHeight;
            return wrapper;
        }

        async function askAI() {
            const text = prompt.value.trim();
            if (!text && !currentBase64) return;
            const msgText = text || "Что на этом фото?";
            const tempImg = currentBase64;
            addMessage('user', msgText, tempImg);
            prompt.value = ''; prompt.style.height = 'auto';
            clearImage();
            const loader = document.createElement('div');
            loader.className = 'ai-wrapper bubble';
            loader.innerHTML = `<div class="ai-avatar">✨</div><div class="ai-bubble"><div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
            chat.appendChild(loader);
            chat.scrollTop = chat.scrollHeight;

            let bodyContent = {
                model: MODEL_ID,
                messages: [{
                    role: "user",
                    content: [{ type: "text", text: msgText }]
                }]
            };
            if (tempImg) {
                bodyContent.messages[0].content.push({
                    type: "image_url",
                    image_url: { url: tempImg }
                });
            }

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${API_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(bodyContent)
                });
                const data = await response.json();
                loader.remove();
                if (response.ok) {
                    addMessage('ai', data.choices[0].message.content);
                } else {
                    addMessage('ai', "Ошибка: " + (data.error ? data.error.message : "неизвестно"));
                }
            } catch (e) {
                loader.remove();
                addMessage('ai', "Ошибка сети. Проверь VPN.");
            }
        }
        btn.onclick = askAI;
        prompt.onkeydown = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); askAI(); } };
    </script>
</body>
</html>

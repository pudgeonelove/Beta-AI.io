<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Beta AI 0.0.2</title>
    <style>
        :root { 
            --bg: #131314; --panel: #1e1f20; --text: #e3e3e3; 
            --accent: #8ab4f8; --user-msg: #2b2c2f; 
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header */
        header { padding: 15px 20px; display: flex; align-items: center; gap: 12px; background: var(--bg); border-bottom: 1px solid #333; }
        .logo-icon { width: 24px; height: 24px; background: linear-gradient(45deg, #4285f4, #9b72cb); border-radius: 6px; }
        header h1 { font-size: 18px; font-weight: 500; }

        /* Chat History */
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .bubble { max-width: 85%; line-height: 1.6; font-size: 16px; position: relative; }
        
        .user-wrapper { align-self: flex-end; }
        .user-bubble { background: var(--user-msg); padding: 12px 18px; border-radius: 20px 20px 4px 20px; }

        .ai-wrapper { align-self: flex-start; display: flex; gap: 12px; width: 100%; }
        .ai-avatar { width: 30px; height: 30px; background: #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .ai-bubble { padding-top: 4px; flex: 1; }

        /* Input Area */
        .input-container { padding: 15px 20px calc(15px + env(safe-area-inset-bottom)); background: var(--bg); }
        .input-bar { 
            background: var(--panel); border-radius: 28px; display: flex; align-items: center; 
            padding: 8px 12px 8px 20px; transition: 0.2s; border: 1px solid transparent;
        }
        .input-bar:focus-within { border-color: #444; background: #252629; }
        
        textarea { 
            flex: 1; background: transparent; border: none; color: white; 
            outline: none; resize: none; font-size: 16px; max-height: 150px; padding: 8px 0;
        }

        button { 
            width: 40px; height: 40px; border-radius: 50%; border: none; 
            background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
        }
        button:disabled { opacity: 0.3; }
        button svg { fill: var(--accent); width: 24px; height: 24px; }

        /* Error Style */
        .error { color: #f28b82; font-size: 14px; margin-top: 5px; }

        @media (min-width: 768px) { #chat, .input-container, header { max-width: 800px; margin: 0 auto; width: 100%; } }
    </style>
</head>
<body>

    <header>
        <div class="logo-icon"></div>
        <h1>Beta AI</h1>
    </header>

    <div id="chat">
        <div class="ai-wrapper">
            <div class="ai-avatar">✨</div>
            <div class="ai-bubble">Привет, чем я могу помочь?</div>
        </div>
    </div>

    <div class="input-container">
        <div class="input-bar">
            <textarea id="prompt" rows="1" placeholder="Спроси о чем угодно..." autocomplete="off"></textarea>
            <button id="sendBtn" disabled>
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
            </button>
        </div>
    </div>

    <script>
        // ЗАМЕНИ ЭТОТ КЛЮЧ НА СВОЙ ИЗ GROQ
        const GROQ_KEY = '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'; 
        
        const chat = document.getElementById('chat');
        const prompt = document.getElementById('prompt');
        const btn = document.getElementById('sendBtn');

        // Авто-высота текста
        prompt.addEventListener('input', () => {
            prompt.style.height = 'auto';
            prompt.style.height = prompt.scrollHeight + 'px';
            btn.disabled = !prompt.value.trim();
        });

        function addMessage(role, text, isError = false) {
            const wrapper = document.createElement('div');
            wrapper.className = role === 'user' ? 'user-wrapper bubble' : 'ai-wrapper bubble';
            
            const content = text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\n/g, '<br>');

            if (role === 'user') {
                wrapper.innerHTML = `<div class="user-bubble">${content}</div>`;
            } else {
                wrapper.innerHTML = `
                    <div class="ai-avatar">✨</div>
                    <div class="ai-bubble ${isError ? 'error' : ''}">${content}</div>
                `;
            }
            
            chat.appendChild(wrapper);
            chat.scrollTop = chat.scrollHeight;
        }

        async function askAI() {
            const text = prompt.value.trim();
            if (!text) return;

            addMessage('user', text);
            prompt.value = '';
            prompt.style.height = 'auto';
            btn.disabled = true;

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${GROQ_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "llama3-8b-8192", // Очень быстрая и умная модель
                        messages: [{ role: "user", content: text }]
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    addMessage('ai', data.choices[0].message.content);
                } else {
                    addMessage('ai', `Ошибка: ${data.error.message}`, true);
                }
            } catch (e) {
                addMessage('ai', 'Ошибка сети. Проверь VPN или ключ API.', true);
            }
        }

        btn.onclick = askAI;
        prompt.onkeydown = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); askAI(); } };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Beta AI Diagnostics</title>
    <style>
        :root { --bg: #0f0f0f; --chat-bg: #1a1a1a; --accent: #4da6ff; --text: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 15px 20px; background: var(--bg); flex-shrink: 0; border-bottom: 1px solid #333; }
        .logo { font-size: 20px; font-weight: 800; color: var(--accent); }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: var(--chat-bg); }
        .msg { max-width: 85%; padding: 10px 14px; border-radius: 18px; font-size: 16px; line-height: 1.4; word-wrap: break-word; }
        .user { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 4px; }
        .ai { align-self: flex-start; background: #333; border-bottom-left-radius: 4px; }
        .error-msg { background: #4a1a1a !important; color: #ff8888 !important; border: 1px solid #ff4444; }
        .input-container { padding: 10px 15px calc(10px + env(safe-area-inset-bottom, 0px)); display: flex; gap: 10px; background: #111; z-index: 1000; }
        input { flex: 1; background: #252525; border: 1px solid #444; color: white; padding: 12px 18px; border-radius: 25px; outline: none; font-size: 16px; }
        button { background: var(--accent); border: none; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        svg { fill: white; width: 20px; height: 20px; }
    </style>
</head>
<body>
    <div class="header"><div class="logo">Beta AI</div></div>
    <div id="messages">
        <div class="msg ai">Привет, чем могу помочь?</div>
    </div>
    <div class="input-container">
        <input type="text" id="userInput" placeholder="Напиши что-нибудь..." autocomplete="off">
        <button id="sendBtn"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg></button>
    </div>

    <script>
        const KEY = 'AIzaSyAbNi8nRsoRdno0wiYTXaFNxsL6ZL-7oYk';
        // Используем более стабильный v1 вместо v1beta
        const URL = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${KEY}`;

        const messagesDiv = document.getElementById('messages');
        const input = document.getElementById('userInput');
        const btn = document.getElementById('sendBtn');

        function addMessage(text, type, isError = false) {
            const div = document.createElement('div');
            div.className = `msg ${type} ${isError ? 'error-msg' : ''}`;
            div.innerHTML = text.replace(/</g, "&lt;").replace(/\n/g, '<br>');
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            return div;
        }

        async function send() {
            const val = input.value.trim();
            if (!val) return;

            addMessage(val, 'user');
            input.value = '';
            const aiMsg = addMessage('...', 'ai');

            try {
                const res = await fetch(URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: val }] }] })
                });

                const data = await res.json();

                if (!res.ok) {
                    // ВЫВОДИМ ПОДРОБНУЮ ОШИБКУ
                    const errorInfo = data.error ? `${data.error.status}: ${data.error.message}` : JSON.stringify(data);
                    aiMsg.classList.add('error-msg');
                    aiMsg.innerHTML = `<b>Техническая ошибка:</b><br>${errorInfo}`;
                    return;
                }

                if (data.candidates && data.candidates[0].content) {
                    aiMsg.innerHTML = data.candidates[0].content.parts[0].text.replace(/\n/g, '<br>');
                }
            } catch (e) {
                aiMsg.classList.add('error-msg');
                aiMsg.innerHTML = `<b>Ошибка запроса:</b><br>${e.message}<br><br>Скорее всего, браузер или провайдер блокирует соединение.`;
            }
        }

        btn.onclick = send;
        input.onkeydown = (e) => { if (e.key === 'Enter') send(); };
    </script>
</body>
</html>

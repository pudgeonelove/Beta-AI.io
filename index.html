<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beta AI Chat</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Название в углу */
        .logo {
            position: absolute;
            top: 20px;
            left: 25px;
            font-size: 24px;
            font-weight: bold;
            color: #4da6ff;
            letter-spacing: 1px;
        }

        /* Чат по центру */
        .chat-container {
            width: 100%;
            max-width: 600px;
            height: 80vh;
            background-color: #1e1e1e;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 8px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .user-msg {
            background-color: #4da6ff;
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .ai-msg {
            background-color: #2d2d2d;
            color: #e0e0e0;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .chat-input-area {
            display: flex;
            padding: 15px;
            background-color: #1a1a1a;
            border-top: 1px solid #333;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #444;
            background-color: #2d2d2d;
            color: #fff;
            border-radius: 6px;
            outline: none;
            font-size: 16px;
        }

        input[type="text"]:focus {
            border-color: #4da6ff;
        }

        button {
            margin-left: 10px;
            padding: 0 20px;
            background-color: #4da6ff;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #3388dd;
        }

        /* Стилизация скроллбара */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e1e1e;
        }
        ::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="logo">Beta AI</div>

    <div class="chat-container">
        <div class="chat-messages" id="chat-messages">
            <div class="message ai-msg">Привет! Я Beta AI. Чем могу помочь?</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Напишите сообщение..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Отправить</button>
        </div>
    </div>

    <script>
        // ВАЖНО: Для полноценной работы ИИ получи бесплатный ключ на https://aistudio.google.com/
        // и вставь его вместо текста 'ТВОЙ_API_КЛЮЧ_ЗДЕСЬ'
        const API_KEY = 'AIzaSyAbNi8nRsoRdno0wiYTXaFNxsL6ZL-7oYk'; 

        const chatMessages = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function appendMessage(text, className) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${className}`;
            // Простая защита от XSS и преобразование переносов строк
            msgDiv.innerHTML = text.replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\n/g, "<br>");
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return msgDiv;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // Показываем сообщение пользователя
            appendMessage(text, 'user-msg');
            userInput.value = '';

            // Создаем плашку "Думает..." для ИИ
            const aiMsgElement = appendMessage('Печатает...', 'ai-msg');

            // Заглушка, если API ключ не добавлен
            if (API_KEY === 'AIzaSyAbNi8nRsoRdno0wiYTXaFNxsL6ZL-7oYk') {
                setTimeout(() => {
                    aiMsgElement.innerHTML = 'Я пока работаю в тестовом режиме. Чтобы я мог искать информацию и отвечать на любые вопросы, добавьте API-ключ Gemini в код сайта.';
                }, 1000);
                return;
            }

            // Отправка запроса к реальной нейросети Gemini
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: text }]
                        }]
                    })
                });

                if (!response.ok) throw new Error('Ошибка сети');

                const data = await response.json();
                const aiResponseText = data.candidates[0].content.parts[0].text;
                
                // Обновляем плашку с реальным ответом
                aiMsgElement.innerHTML = aiResponseText.replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\n/g, "<br>");
                
            } catch (error) {
                aiMsgElement.innerHTML = 'Произошла ошибка при подключении к серверу ИИ. Проверьте интернет или API-ключ.';
            }
        }
    </script>
</body>
  </html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Beta AI</title>
    <style>
        :root { 
            --bg: #0f0f0f; 
            --chat-bg: #1a1a1a; 
            --accent: #4da6ff; 
            --text: #ffffff; 
            --input-height: 70px;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
        }

        /* Шапка */
        .header { 
            padding: 15px 20px; 
            background: var(--bg); 
            border-bottom: 1px solid #333;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
        }

        .logo { font-size: 20px; font-weight: 800; color: var(--accent); }

        /* Область сообщений */
        #messages { 
            flex: 1;
            overflow-y: auto;
            padding: 80px 15px 100px 15px; /* Отступы для шапки и поля ввода */
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: var(--chat-bg);
            -webkit-overflow-scrolling: touch;
        }

        .msg { 
            max-width: 85%; 
            padding: 10px 14px; 
            border-radius: 18px; 
            font-size: 16px; 
            line-height: 1.4; 
            word-wrap: break-word; 
        }

        .user { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 4px; }
        .ai { align-self: flex-start; background: #333; border-bottom-left-radius: 4px; }
        .error-msg { background: #4a1a1a !important; color: #ff8888 !important; border: 1px solid #ff4444; }

        /* ФИКСИРОВАННОЕ ПОЛЕ ВВОДА */
        .input-container { 
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 10px 15px calc(15px + env(safe-area-inset-bottom, 0px)); 
            display: flex; 
            gap: 10px; 
            background: #111; 
            border-top: 1px solid #333;
            z-index: 1000;
        }

        input { 
            flex: 1; 
            background: #252525; 
            border: 1px solid #444; 
            color: white; 
            padding: 12px 18px; 
            border-radius: 25px; 
            outline: none; 
            font-size: 16px; 
        }

        button { 
            background: var(--accent); 
            border: none; 
            width: 46px; 
            height: 46px; 
            border-radius: 50%; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            flex-shrink: 0;
        }

        svg { fill: white; width: 22px; height: 22px; }

        /* Для больших экранов ограничим ширину */
        @media (min-width: 768px) {
            #messages, .input-container, .header {
                max-width: 600px;
                margin: 0 auto;
                left: 0; right: 0;
            }
        }
    </style>
</head>
<body>
    <div class="header"><div class="logo">Beta AI</div></div>
    
    <div id="messages">
        <div class="msg ai">Привет, чем могу помочь?</div>
    </div>

    <div class="input-container">
        <input type="text" id="userInput" placeholder="Напиши сообщение..." autocomplete="off">
        <button id="sendBtn">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
    </div>

    <script>
        const KEY = 'AIzaSyAbNi8nRsoRdno0wiYTXaFNxsL6ZL-7oYk';
        const URL = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${KEY}`;

        const messagesDiv = document.getElementById('messages');
        const input = document.getElementById('userInput');
        const btn = document.getElementById('sendBtn');

        function addMessage(text, type, isError = false) {
            const div = document.createElement('div');
            div.className = `msg ${type} ${isError ? 'error-msg' : ''}`;
            div.innerHTML = text.replace(/</g, "&lt;").replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
            messagesDiv.appendChild(div);
            messagesDiv.scrollTo({ top: messagesDiv.scrollHeight, behavior: 'smooth' });
            return div;
        }

        async function send() {
            const val = input.value.trim();
            if (!val) return;

            addMessage(val, 'user');
            input.value = '';
            const aiMsg = addMessage('...', 'ai');

            try {
                const res = await fetch(URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: val }] }] })
                });

                const data = await res.json();

                if (!res.ok) {
                    const msg = data.error ? data.error.message : 'Неизвестная ошибка';
                    aiMsg.classList.add('error-msg');
                    aiMsg.innerHTML = `<b>Ошибка API:</b><br>${msg}<br><br>Попробуй сменить регион в VPN.`;
                    return;
                }

                if (data.candidates && data.candidates[0].content) {
                    const text = data.candidates[0].content.parts[0].text;
                    aiMsg.innerHTML = text.replace(/</g, "&lt;").replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
                }
            } catch (e) {
                aiMsg.classList.add('error-msg');
                aiMsg.innerHTML = `<b>Ошибка сети:</b><br>${e.message}<br><br>Проверь VPN (нужен регион США или Европа).`;
            }
        }

        btn.onclick = send;
        input.onkeydown = (e) => { if (e.key === 'Enter') send(); };
    </script>
</body>
</html>

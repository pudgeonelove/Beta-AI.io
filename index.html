<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Beta AI</title>
    <style>
        :root { 
            --bg-color: #131314; 
            --chat-bg: #131314; 
            --user-bubble: #282a2c; 
            --text-main: #e3e3e3; 
            --text-muted: #c4c7c5;
            --input-bg: #1e1f20;
            --accent: #a8c7fa;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        html, body { 
            height: 100dvh; 
            width: 100%; 
            background: var(--bg-color); 
            color: var(--text-main); 
            font-family: -apple-system, sans-serif;
            overflow: hidden; 
            display: flex; 
            flex-direction: column;
        }

        .header { padding: 16px 20px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .header-logo svg { width: 24px; height: 24px; fill: var(--accent); }
        .header-title { font-size: 18px; font-weight: 500; }

        #chat-area { 
            flex: 1; 
            overflow-y: auto; 
            padding: 10px 20px 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 24px; 
        }

        .msg-wrapper { display: flex; width: 100%; }
        .msg-wrapper.user { justify-content: flex-end; }
        .msg-wrapper.ai { justify-content: flex-start; gap: 12px; }

        .ai-icon svg { width: 20px; height: 20px; fill: var(--accent); }

        .msg { font-size: 16px; line-height: 1.6; word-wrap: break-word; }

        .user .msg { 
            background: var(--user-bubble); 
            padding: 12px 18px; 
            border-radius: 24px 24px 4px 24px; 
            max-width: 85%;
        }

        .ai .msg { max-width: 90%; color: var(--text-main); }
        .error-text { color: #ff8a8a; font-size: 14px; background: #3a1c1c; padding: 12px; border-radius: 12px; border: 1px solid #5c2828; width: 100%; }

        .input-wrapper { padding: 10px 20px calc(15px + env(safe-area-inset-bottom, 0px)); background: var(--bg-color); }
        .input-box {
            display: flex; 
            align-items: flex-end; 
            background: var(--input-bg); 
            border-radius: 32px;
            padding: 8px 12px 8px 20px;
        }

        textarea { 
            flex: 1; background: transparent; border: none; color: var(--text-main); 
            font-size: 16px; outline: none; resize: none; max-height: 120px; padding: 10px 0;
        }

        .send-btn { background: transparent; border: none; width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .send-btn svg { width: 24px; height: 24px; fill: var(--text-muted); }
        .send-btn.active svg { fill: var(--accent); }

        @media (min-width: 768px) { .header, #chat-area, .input-wrapper { max-width: 800px; margin: 0 auto; width: 100%; } }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-logo"><svg viewBox="0 0 24 24"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"></path></svg></div>
        <div class="header-title">Beta AI</div>
    </div>

    <div id="chat-area">
        <div class="msg-wrapper ai">
            <div class="ai-icon"><svg viewBox="0 0 24 24"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"></path></svg></div>
            <div class="msg">Привет, чем могу помочь?</div>
        </div>
    </div>

    <div class="input-wrapper">
        <div class="input-box">
            <textarea id="userInput" rows="1" placeholder="Задай вопрос..." autocomplete="off"></textarea>
            <button id="sendBtn" class="send-btn">
                <svg viewBox="0 0 24 24"><path d="M3 20v-6l8-2-8-2V4l19 8z"></path></svg>
            </button>
        </div>
    </div>

    <script>
        const KEY = 'AIzaSyACOr0QbBpFyct5FbdZvsZK_SgvVc3mtSI';
        
        const chatArea = document.getElementById('chat-area');
        const input = document.getElementById('userInput');
        const btn = document.getElementById('sendBtn');

        input.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = this.scrollHeight + 'px';
            btn.classList.toggle('active', this.value.trim().length > 0);
        });

        function appendMessage(sender, text, isError = false) {
            const wrapper = document.createElement('div');
            wrapper.className = `msg-wrapper ${sender}`;
            const content = text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\n/g, '<br>');
            
            if (sender === 'ai') {
                wrapper.innerHTML = `<div class="ai-icon"><svg viewBox="0 0 24 24"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"></path></svg></div>
                                     <div class="msg ${isError ? 'error-text' : ''}">${content}</div>`;
            } else {
                wrapper.innerHTML = `<div class="msg">${content}</div>`;
            }
            chatArea.appendChild(wrapper);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            input.value = '';
            input.style.height = 'auto';
            appendMessage('user', text);

            // Пробуем сначала самую быструю модель 1.5 Flash через стабильный v1
            const API_URL = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${KEY}`;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });

                const data = await response.json();

                if (response.ok) {
                    const reply = data.candidates[0].content.parts[0].text;
                    appendMessage('ai', reply);
                } else {
                    // Если ошибка 400/404/403, выводим подробности
                    const errMsg = data.error ? data.error.message : 'Неизвестная ошибка';
                    appendMessage('ai', `<b>Ошибка API:</b> ${errMsg}<br><br><i>Код: ${response.status}</i>`, true);
                }
            } catch (e) {
                appendMessage('ai', `<b>Ошибка сети:</b> Вероятно, VPN не активен или Google блокирует запрос.`, true);
            }
        }

        btn.onclick = sendMessage;
        input.onkeydown = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
    </script>
</body>
</html>

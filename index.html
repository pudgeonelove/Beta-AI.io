<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Beta AI</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #0f0f12;
  color: white;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Лого в углу */
.logo {
  position: fixed;
  top: 15px;
  left: 15px;
  font-size: 18px;
  font-weight: bold;
  color: #7c5cff;
}

/* Чат контейнер */
.chat-container {
  width: 100%;
  max-width: 600px;
  height: 85vh;
  display: flex;
  flex-direction: column;
  border: 1px solid #2a2a2a;
  border-radius: 12px;
  overflow: hidden;
  background: #15151b;
}

/* сообщения */
.chat-box {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
}

/* сообщения */
.msg {
  margin: 8px 0;
  padding: 10px;
  border-radius: 10px;
  max-width: 80%;
  word-wrap: break-word;
}

.user {
  background: #7c5cff;
  margin-left: auto;
}

.ai {
  background: #2a2a2a;
}

/* ввод */
.input-area {
  display: flex;
  border-top: 1px solid #2a2a2a;
}

input {
  flex: 1;
  padding: 12px;
  border: none;
  outline: none;
  background: #1e1e26;
  color: white;
}

button {
  padding: 12px 16px;
  border: none;
  background: #7c5cff;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #6848ff;
}

/* мобилка */
@media (max-width: 600px) {
  .chat-container {
    height: 100vh;
    border-radius: 0;
  }
}
</style>
</head>

<body>

<div class="logo">Beta AI</div>

<div class="chat-container">
  <div id="chat" class="chat-box"></div>

  <div class="input-area">
    <input id="input" placeholder="Напиши сообщение..." />
    <button onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
const API_KEY = "AIzaSyAbNi8nRsoRdno0wiYTXaFNxsL6ZL-7oYk";

async function sendMessage() {
  const input = document.getElementById("input");
  const chat = document.getElementById("chat");

  const text = input.value.trim();
  if (!text) return;

  // user msg
  chat.innerHTML += `<div class="msg user">${text}</div>`;
  input.value = "";
  chat.scrollTop = chat.scrollHeight;

  // запрос к Gemini API (Google AI Studio)
  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [
            {
              parts: [{ text: text }]
            }
          ]
        })
      }
    );

    const data = await res.json();
    const reply =
      data?.candidates?.[0]?.content?.parts?.[0]?.text ||
      "Ошибка ответа";

    chat.innerHTML += `<div class="msg ai">${reply}</div>`;
    chat.scrollTop = chat.scrollHeight;

  } catch (e) {
    chat.innerHTML += `<div class="msg ai">Ошибка запроса</div>`;
  }
}
</script>

</body>
</html>

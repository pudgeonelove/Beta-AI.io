<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Beta AI</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --chat-bg: #1a1a1a;
            --accent: #4da6ff;
            --text: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Название в углу */
        .logo {
            padding: 15px 20px;
            font-size: 22px;
            font-weight: 800;
            color: var(--accent);
            background: var(--bg);
        }

        /* Контейнер чата */
        #chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            background: var(--chat-bg);
            border-top: 1px solid #333;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .msg {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 15px;
            line-height: 1.5;
            font-size: 16px;
            word-wrap: break-word;
        }

        .user {
            align-self: flex-end;
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 2px;
        }

        .ai {
            align-self: flex-start;
            background: #333;
            color: #eee;
            border-bottom-left-radius: 2px;
        }

        /* Поле ввода */
        .input-area {
            padding: 15px;
            display: flex;
            gap: 10px;
            background: #111;
            border-top: 1px solid #333;
            padding-bottom: env(safe-area-inset-bottom, 15px);
        }

        input {
            flex: 1;
            background: #252525;
            border: 1px solid #444;
            color: white;
            padding: 12px 18px;
            border-radius: 25px;
            outline: none;
            font-size: 16px; /* Важно для мобилок чтобы не зумило */
        }

        button {
            background: var(--accent);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        button:active { transform: scale(0.9); }

        svg { fill: white; width: 20px; height: 20px; }

        @media (min-width: 768px) {
            #chat-container {
                margin-bottom: 20px;
                border-radius: 15px;
                border: 1px solid #333;
            }
        }
    </style>
</head>
<body>

    <div class="logo">Beta AI</div>

    <div id="chat-container">
        <div id="messages">
            <div class="msg ai">Привет! Я Beta AI. Готов общаться.</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Напиши что-нибудь..." autocomplete="off">
            <button id="sendBtn">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
            </button>
        </div>
    </div>

    <script>
        // Твой API ключ успешно интегрирован
        const KEY = 'AIzaSyAbNi8nRsoRdno0wiYTXaFNxsL6ZL-7oYk';
        const URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`;

        const messagesDiv = document.getElementById('messages');
        const input = document.getElementById('userInput');
        const btn = document.getElementById('sendBtn');

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerHTML = text.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            return div;
        }

        async function main() {
            const val = input.value.trim();
            if (!val) return;

            addMessage(val, 'user');
            input.value = '';

            const aiMsg = addMessage('...', 'ai');

            try {
                const res = await fetch(URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: val }] }] })
                });

                const data = await res.json();

                if (data.candidates && data.candidates[0].content) {
                    aiMsg.innerHTML = data.candidates[0].content.parts[0].text
                        .replace(/\n/g, '<br>')
                        .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
                } else {
                    aiMsg.innerText = "Ошибка: ИИ не ответил. Попробуй включить VPN.";
                }
            } catch (e) {
                aiMsg.innerText = "Ошибка соединения. Проверь интернет или VPN.";
            }
        }

        // Клик по кнопке
        btn.addEventListener('click', main);

        // Нажатие Enter
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') main();
        });
    </script>
</body>
</html>
